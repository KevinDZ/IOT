
syntax = "proto3";

package vehicle;
option go_package = "./vehicle";


enum Action {
  option allow_alias = true; // 允许别名（Alias）
  int32 LockDoor = 1;
  int32 UnlockDoor = 2;
   
}

// 车辆控制请求
message ControlReq {
  string VehicleID = 1;
  string Action = 2; // 如 unlock_door, start_engine
}

// 车辆控制响应
message ControlResp {
  int32 Code = 1;
  string Msg = 2;
}

// 车辆状态查询响应
message VehicleStatusResp {
  string VehicleID = 1;
  double Speed = 2; // 车速 (km/h)
  double FuelLevel = 3; // 油量
  bool EngineOn = 4; // 启动
  double Battery = 5; // 电量 (%)
  bool  IsOnline = 6;   // 在线状态
  double LastUpdated  = 7; // 状态更新时间戳
}

service VehicleService {
  // 接收云端下发的控制指令
  rpc ControlVehicle(ControlReq) returns (ControlResp);
  // 供其他服务查询车辆实时状态
  rpc GetVehicleStatus(ControlReq) returns (VehicleStatusResp);

  rpc Ping(Request) returns(Response);
}


message Request {
  string ping = 1;
}

message Response {
  string pong = 1;
}